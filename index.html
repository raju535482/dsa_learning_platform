<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Academy — Interactive Java & Kotlin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --font-scale: 1.0;
}

[data-theme="dark"] {
  --bg-base:    #08090e;
  --bg-surface: #0e101a;
  --bg-card:    #12151f;
  --bg-hover:   #181c2a;
  --bg-input:   #0e101a;
  --border:     rgba(255,255,255,0.07);
  --border-med: rgba(255,255,255,0.12);
  --text-1: #f0f2f8;
  --text-2: #8b93b0;
  --text-3: #4a5270;
  --accent:  #6366f1;
  --accent2: #818cf8;
  --accent-bg: rgba(99,102,241,0.12);
  --accent-border: rgba(99,102,241,0.4);
  --green:  #10b981;
  --green-bg: rgba(16,185,129,0.12);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.12);
  --red:    #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --blue:   #60a5fa;
  --blue-bg: rgba(96,165,250,0.12);
  --code-kw:   #c084fc;
  --code-str:  #86efac;
  --code-num:  #fb923c;
  --code-cmt:  #6272a4;
  --code-fn:   #93c5fd;
  --code-tp:   #fcd34d;
  --code-type: #34d399;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --glow: 0 0 20px rgba(99,102,241,0.3);
  --topbar-rgb: 8,9,14;
}

[data-theme="light"] {
  --bg-base:    #f4f5fa;
  --bg-surface: #ffffff;
  --bg-card:    #ffffff;
  --bg-hover:   #f0f1f8;
  --bg-input:   #f4f5fa;
  --border:     rgba(0,0,0,0.07);
  --border-med: rgba(0,0,0,0.12);
  --text-1: #0f1123;
  --text-2: #4b5280;
  --text-3: #9ca3c0;
  --accent:  #4f46e5;
  --accent2: #6366f1;
  --accent-bg: rgba(79,70,229,0.08);
  --accent-border: rgba(79,70,229,0.3);
  --green:  #059669;
  --green-bg: rgba(5,150,105,0.1);
  --yellow: #d97706;
  --yellow-bg: rgba(217,119,6,0.1);
  --red:    #dc2626;
  --red-bg: rgba(220,38,38,0.1);
  --blue:   #2563eb;
  --blue-bg: rgba(37,99,235,0.1);
  --code-kw:   #7c3aed;
  --code-str:  #15803d;
  --code-num:  #c2410c;
  --code-cmt:  #9ca3af;
  --code-fn:   #1d4ed8;
  --code-tp:   #b45309;
  --code-type: #059669;
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
  --glow: 0 0 20px rgba(79,70,229,0.15);
  --topbar-rgb: 244,245,250;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-sans);
  background: var(--bg-base);
  color: var(--text-1);
  overflow: hidden;
  font-size: calc(14px * var(--font-scale));
  transition: background 0.3s var(--ease), color 0.3s var(--ease);
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ── Layout ── */
.app { display:flex; height:100vh; overflow:hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 260px; min-width: 260px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
  transition: background 0.3s var(--ease);
}
.sidebar::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:200px;
  background: linear-gradient(180deg, rgba(99,102,241,0.06) 0%, transparent 100%);
  pointer-events:none;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.sidebar-logo {
  display:flex; align-items:center; gap:10px;
  font-size:16px; font-weight:800; color:var(--text-1);
  letter-spacing:-0.03em;
}
.sidebar-logo-icon {
  width:32px; height:32px; border-radius:9px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:15px;
  box-shadow: 0 4px 12px rgba(99,102,241,0.4);
}
.sidebar-sub { font-size:11px; color:var(--text-3); margin-top:3px; font-weight:500; }

.search-wrap { padding:12px 14px; border-bottom:1px solid var(--border); }
.search-box {
  display:flex; align-items:center; gap:8px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius: var(--radius-md); padding:8px 12px;
  transition: all 0.2s var(--ease);
}
.search-box:focus-within {
  border-color: var(--accent-border);
  box-shadow: 0 0 0 3px var(--accent-bg);
}
.search-box i { color:var(--text-3); font-size:14px; flex-shrink:0; }
.search-box input {
  background:none; border:none; outline:none; width:100%;
  font-size: calc(12.5px * var(--font-scale));
  color:var(--text-1); font-family:var(--font-sans);
}
.search-box input::placeholder { color:var(--text-3); }

.nav-list { overflow-y:auto; flex:1; padding:10px 10px; display:flex; flex-direction:column; gap:1px; }
.nav-cat {
  font-size: calc(10px * var(--font-scale));
  font-weight:700; color:var(--text-3); text-transform:uppercase;
  letter-spacing:0.1em; padding:14px 10px 6px;
}
.nav-item {
  display:flex; align-items:center; gap:9px;
  padding:8px 12px; cursor:pointer;
  font-size: calc(13px * var(--font-scale));
  font-weight:500; color:var(--text-2);
  border-radius:var(--radius-md);
  transition: all 0.18s var(--ease); position:relative;
}
.nav-item:hover { background:var(--bg-hover); color:var(--text-1); }
.nav-item.active { background:var(--accent-bg); color:var(--accent2); font-weight:600; }
.nav-item.active::before {
  content:''; position:absolute; left:-1px; top:50%;
  transform:translateY(-50%);
  width:3px; height:18px; background:var(--accent);
  border-radius:0 3px 3px 0;
}
.nav-badge {
  margin-left:auto; font-size: calc(9.5px * var(--font-scale));
  font-weight:600; padding:2px 7px; border-radius:99px;
  background:var(--bg-hover); color:var(--text-3); border:1px solid var(--border);
}
.nav-item.active .nav-badge { background:var(--accent-bg); color:var(--accent2); border-color:transparent; }

/* ── Main ── */
.main { flex:1; overflow-y:auto; display:flex; flex-direction:column; background:var(--bg-base); }

.topbar {
  padding:14px 28px; border-bottom:1px solid var(--border);
  background:rgba(var(--topbar-rgb),0.8);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  display:flex; align-items:center; gap:12px; flex-shrink:0;
  position:sticky; top:0; z-index:100;
  transition: background 0.3s var(--ease);
}
.topbar h1 {
  font-size: calc(17px * var(--font-scale));
  font-weight:700; letter-spacing:-0.02em;
  background: linear-gradient(135deg, var(--text-1) 0%, var(--text-2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.topbar-right { display:flex; align-items:center; gap:8px; margin-left:auto; }

.lang-tabs { display:flex; gap:4px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:3px; }
.lang-tab {
  padding:5px 14px; font-size:calc(12.5px * var(--font-scale)); border:none;
  border-radius:7px; cursor:pointer; background:transparent; color:var(--text-2);
  font-weight:500; transition:all 0.18s var(--ease); font-family:var(--font-sans);
}
.lang-tab.active { background:var(--accent); color:#fff; font-weight:600; box-shadow: 0 2px 8px rgba(99,102,241,0.4); }

.font-controls {
  display:flex; align-items:center;
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:3px; gap:1px;
}
.font-btn {
  width:26px; height:26px; border:none; border-radius:6px; cursor:pointer;
  background:transparent; color:var(--text-2); display:flex; align-items:center;
  justify-content:center; font-size:13px; transition:all 0.15s var(--ease);
  font-family:var(--font-sans);
}
.font-btn:hover { background:var(--bg-hover); color:var(--text-1); }
.font-indicator {
  font-size:11px; font-weight:600; color:var(--text-2); padding:0 8px;
  min-width:42px; text-align:center; cursor:pointer; user-select:none;
  font-family:var(--font-mono); transition:color 0.15s;
}
.font-indicator:hover { color:var(--accent2); }

.theme-toggle {
  width:32px; height:32px; border:1px solid var(--border); border-radius:var(--radius-md);
  cursor:pointer; background:var(--bg-card); color:var(--text-2);
  display:flex; align-items:center; justify-content:center; font-size:15px;
  transition:all 0.18s var(--ease);
}
.theme-toggle:hover { background:var(--bg-hover); color:var(--text-1); border-color:var(--border-med); }

/* ── Content ── */
.content { padding:28px 32px; flex:1; max-width:980px; width:100%; margin:0 auto; }

.topic-header { margin-bottom:22px; }
.topic-tag {
  display:inline-flex; align-items:center; gap:5px;
  font-size:calc(10.5px * var(--font-scale)); padding:3px 10px;
  border-radius:99px; margin-bottom:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.06em;
}
.topic-title {
  font-size:calc(24px * var(--font-scale)); font-weight:800;
  letter-spacing:-0.03em; margin-bottom:8px;
  background:linear-gradient(135deg, var(--text-1) 0%, var(--text-2) 120%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.topic-desc { font-size:calc(14px * var(--font-scale)); color:var(--text-2); line-height:1.65; }

/* ── Section title ── */
.section-title {
  font-size:calc(10.5px * var(--font-scale)); font-weight:700; color:var(--text-3);
  text-transform:uppercase; letter-spacing:0.08em;
  margin:28px 0 14px; display:flex; align-items:center; gap:8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.section-title i { font-size:13px; }

/* ── Stat cards ── */
.stat-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:24px;
}
.stat-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:16px 18px;
  transition:all 0.22s var(--ease); position:relative; overflow:hidden;
  cursor:default;
}
.stat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(135deg, rgba(99,102,241,0.04) 0%, transparent 60%);
  opacity:0; transition:opacity 0.22s var(--ease);
}
.stat-card:hover { transform:translateY(-2px); border-color:var(--accent-border); box-shadow:var(--shadow-sm); }
.stat-card:hover::before { opacity:1; }
.stat-label { font-size:calc(10.5px * var(--font-scale)); color:var(--text-3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
.stat-value { font-size:calc(15px * var(--font-scale)); font-weight:700; color:var(--text-1); font-family:var(--font-mono); }

/* ── Viz area ── */
.viz-area {
  background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius-xl);
  padding:22px; margin-bottom:24px;
  position:relative; overflow:hidden;
}
.viz-area::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.4;
}
.viz-controls {
  display:flex; gap:7px; margin-bottom:18px; flex-wrap:wrap; align-items:center;
}
.viz-btn {
  font-size:calc(12px * var(--font-scale)); padding:6px 14px;
  border:1px solid var(--border-med); border-radius:var(--radius-md);
  cursor:pointer; background:var(--bg-surface); color:var(--text-1);
  font-weight:600; transition:all 0.18s var(--ease); display:flex;
  align-items:center; gap:6px; font-family:var(--font-sans);
}
.viz-btn:hover { background:var(--accent-bg); color:var(--accent2); border-color:var(--accent-border); }
.viz-btn:active { transform:scale(0.97); }
.viz-btn.primary { background:var(--accent); color:#fff; border-color:transparent; box-shadow:0 2px 10px rgba(99,102,241,0.35); }
.viz-btn.primary:hover { background:#5254e0; }

.viz-canvas {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap; min-height:64px; padding:8px 0;
}
.step-log {
  margin-top:14px; padding:10px 14px; border-radius:var(--radius-md);
  background:var(--bg-surface); border:1px dashed var(--border);
  font-size:calc(12px * var(--font-scale)); color:var(--text-2);
  font-family:var(--font-mono); line-height:1.5; min-height:40px;
  transition:all 0.2s var(--ease);
}

/* ── Array boxes ── */
.arr-box {
  width:calc(48px * var(--font-scale)); height:calc(48px * var(--font-scale));
  display:flex; align-items:center; justify-content:center;
  border:2px solid var(--border-med); border-radius:var(--radius-md);
  font-size:calc(14px * var(--font-scale)); font-weight:700;
  background:var(--bg-surface); color:var(--text-1);
  transition:all 0.25s var(--ease); position:relative; cursor:pointer; user-select:none;
}
.arr-box:hover { transform:translateY(-2px); border-color:var(--accent-border); box-shadow:var(--glow); }
.arr-box .idx {
  position:absolute; bottom:-20px; font-size:calc(9.5px * var(--font-scale));
  color:var(--text-3); font-weight:600; font-family:var(--font-mono);
}
.arr-box.highlight {
  background:var(--accent-bg); border-color:var(--accent);
  color:var(--accent2); box-shadow:0 0 14px rgba(99,102,241,0.25);
  animation: pulse-box 1.2s ease-in-out infinite;
}
.arr-box.found {
  background:var(--green-bg); border-color:var(--green); color:var(--green);
  box-shadow:0 0 14px rgba(16,185,129,0.3); animation: pop-in 0.3s var(--ease);
}
.arr-box.compare {
  background:var(--yellow-bg); border-color:var(--yellow); color:var(--yellow);
  animation: pulse-box 0.8s ease-in-out infinite;
}
.arr-box.sorted {
  background:var(--green-bg); border-color:var(--green); color:var(--green);
}

/* ── Node/LL ── */
.node { display:inline-flex; flex-direction:column; align-items:center; gap:2px; }
.node-box {
  min-width:calc(48px * var(--font-scale)); height:calc(40px * var(--font-scale));
  display:flex; align-items:center; justify-content:center;
  border:2px solid var(--border-med); border-radius:var(--radius-md);
  font-size:calc(13px * var(--font-scale)); font-weight:700;
  background:var(--bg-surface); padding:0 14px; transition:all 0.2s var(--ease);
}
.node-box:hover { border-color:var(--accent-border); background:var(--accent-bg); }
.arrow {
  font-size:calc(18px * var(--font-scale)); color:var(--text-3); font-weight:600;
  user-select:none; padding:0 4px;
}

/* ── Code block ── */
.code-block {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-xl); overflow:hidden; margin-bottom:24px;
  box-shadow:var(--shadow-sm);
}
.code-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 18px; border-bottom:1px solid var(--border);
  background:var(--bg-surface);
  font-size:calc(12px * var(--font-scale)); font-weight:600; color:var(--text-2);
}
.code-header-left { display:flex; align-items:center; gap:8px; }
.code-dots { display:flex; gap:5px; }
.code-dots span { width:10px; height:10px; border-radius:50%; }
.code-dots .dot-r { background:#ef4444; }
.code-dots .dot-y { background:#f59e0b; }
.code-dots .dot-g { background:#10b981; }
.code-actions { display:flex; gap:6px; }
.code-btn {
  font-size:calc(11px * var(--font-scale)); padding:4px 11px;
  border:1px solid var(--border-med); border-radius:7px; cursor:pointer;
  background:var(--bg-card); color:var(--text-2); font-weight:600;
  display:flex; align-items:center; gap:5px; transition:all 0.18s var(--ease);
  font-family:var(--font-sans);
}
.code-btn:hover { background:var(--bg-hover); color:var(--text-1); border-color:var(--border-med); }
.code-btn.run { background:rgba(16,185,129,0.12); color:var(--green); border-color:rgba(16,185,129,0.3); }
.code-btn.run:hover { background:rgba(16,185,129,0.2); }
.code-body {
  padding:20px; font-family:var(--font-mono);
  font-size:calc(13px * var(--font-scale)); line-height:1.75;
  overflow-x:auto; white-space:pre; color:var(--text-1);
  background:var(--bg-card);
}

/* ── Syntax tokens ── */
.kw,  .hl-kw      { color:var(--code-kw); font-weight:600; }
.str, .hl-str     { color:var(--code-str); }
.num, .hl-num     { color:var(--code-num); }
.cmt, .hl-comment { color:var(--code-cmt); font-style:italic; }
.fn,  .hl-fn      { color:var(--code-fn); }
.tp,  .hl-type    { color:var(--code-type); }
.hl-bracket       { color:var(--accent2); }
.hl-annotation    { color:var(--yellow); }

/* ── Mechanics card ── */
.mechanics-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-xl); padding:22px; margin-bottom:24px;
  box-shadow:var(--shadow-sm);
}
.mech-visual {
  font-family:var(--font-mono); background:var(--bg-base);
  border:1px solid var(--border); border-radius:var(--radius-md);
  padding:16px; color:var(--text-1); line-height:1.55;
  white-space:pre; overflow-x:auto; font-size:calc(12.5px * var(--font-scale));
  margin-bottom:14px;
}
.mech-desc { font-size:calc(13.5px * var(--font-scale)); color:var(--text-2); line-height:1.65; margin-bottom:14px; }
.mech-steps { display:flex; flex-direction:column; gap:9px; }
.mech-step { display:flex; align-items:flex-start; gap:10px; font-size:calc(13px * var(--font-scale)); color:var(--text-2); }
.mech-step-num {
  background:var(--accent-bg); color:var(--accent2); font-weight:800;
  font-size:calc(10px * var(--font-scale)); width:22px; height:22px;
  border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.narrator-btn {
  padding:5px 12px; font-size:calc(11px * var(--font-scale)); font-weight:600;
  display:flex; align-items:center; gap:5px; border-radius:7px;
  background:var(--accent-bg); border:1px solid var(--accent-border);
  color:var(--accent2); cursor:pointer; transition:all 0.2s var(--ease);
  font-family:var(--font-sans);
}
.narrator-btn:hover { background:var(--accent); color:#fff; }

/* ── Big-O table ── */
.bigo-table { width:100%; border-collapse:collapse; font-size:calc(13px * var(--font-scale)); }
.bigo-table th {
  text-align:left; padding:10px 14px; font-weight:700;
  border-bottom:1px solid var(--border); color:var(--text-3);
  font-size:calc(10.5px * var(--font-scale)); text-transform:uppercase; letter-spacing:0.06em;
  background:var(--bg-surface);
}
.bigo-table td { padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text-1); }
.bigo-table tr:hover td { background:var(--bg-hover); }
.bigo-table tr:last-child td { border-bottom:none; }

/* ── Badges ── */
.badge { display:inline-block; font-size:11px; padding:3px 8px; border-radius:6px; font-weight:700; font-family:var(--font-mono); }
.badge-g { background:var(--green-bg); color:var(--green); }
.badge-y { background:var(--yellow-bg); color:var(--yellow); }
.badge-r { background:var(--red-bg); color:var(--red); }
.badge-b { background:var(--blue-bg); color:var(--blue); }
.badge-p { background:var(--accent-bg); color:var(--accent2); }

/* ── LeetCode cards ── */
.lc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; margin-top:10px; }
.lc-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:all 0.22s var(--ease);
}
.lc-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
.lc-card:has(.lc-diff-medium):hover { border-color:rgba(245,158,11,0.4); }
.lc-card:has(.lc-diff-hard):hover { border-color:rgba(239,68,68,0.4); }
.lc-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
.lc-title { font-size:calc(13.5px * var(--font-scale)); font-weight:700; color:var(--text-1); }
.lc-difficulty { font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; text-transform:uppercase; flex-shrink:0; }
.lc-diff-medium { background:var(--yellow-bg); color:var(--yellow); }
.lc-diff-hard { background:var(--red-bg); color:var(--red); }
.lc-desc { font-size:calc(12.5px * var(--font-scale)); color:var(--text-2); line-height:1.55; margin-bottom:10px; }
.lc-hint {
  background:var(--bg-base); border-left:3px solid var(--border-med);
  padding:8px 12px; font-size:calc(12px * var(--font-scale));
  color:var(--text-2); border-radius:0 var(--radius-sm) var(--radius-sm) 0; margin-bottom:14px;
}
.lc-hint strong { color:var(--text-1); }
.lc-link {
  align-self:flex-start; display:flex; align-items:center; gap:5px;
  font-size:calc(12.5px * var(--font-scale)); font-weight:600; color:var(--accent2);
  text-decoration:none; transition:opacity 0.18s;
}
.lc-link:hover { opacity:0.75; }

/* ── Terminal ── */
.terminal {
  display:none; margin-top:14px; background:#08090e;
  border:1px solid var(--border-med); border-radius:var(--radius-xl);
  overflow:hidden; box-shadow:var(--shadow);
}
.terminal-topbar {
  display:flex; justify-content:space-between; align-items:center;
  background:var(--bg-surface); padding:9px 14px; border-bottom:1px solid var(--border);
}
.terminal-dots { display:flex; gap:6px; }
.terminal-dots span { width:10px; height:10px; border-radius:50%; }
.terminal-label {
  font-size:11px; font-weight:600; font-family:var(--font-mono);
  color:var(--text-3); margin-left:8px;
}
.terminal-close {
  background:none; border:none; color:var(--text-3); cursor:pointer;
  font-size:13px; display:flex; align-items:center; padding:2px;
}
.terminal-body {
  padding:16px; font-family:var(--font-mono); font-size:calc(13px * var(--font-scale));
  line-height:1.65; color:#e2e8f0; min-height:100px; max-height:260px;
  overflow-y:auto; white-space:pre-wrap;
}
.terminal-cursor {
  display:inline-block; width:7px; height:14px; background:var(--green);
  margin-left:2px; vertical-align:middle; animation:blink 1s step-start infinite;
}

/* ── Quiz ── */
.quiz-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-xl); padding:20px; margin-bottom:24px;
}
.quiz-q { font-size:calc(13px * var(--font-scale)); font-weight:700; color:var(--text-1); line-height:1.5; margin-bottom:12px; }
.quiz-choices { display:flex; flex-direction:column; gap:7px; }
.quiz-choice-btn {
  width:100%; padding:10px 14px; font-size:calc(12.5px * var(--font-scale));
  font-weight:600; text-align:left; border-radius:var(--radius-md);
  border:1.5px solid var(--border); background:var(--bg-surface);
  color:var(--text-1); cursor:pointer; transition:all 0.18s var(--ease);
  font-family:var(--font-sans);
}
.quiz-choice-btn:hover:not(:disabled) { background:var(--accent-bg); border-color:var(--accent-border); color:var(--accent2); }
.quiz-feedback {
  display:none; margin-top:10px; padding:10px 14px;
  border-radius:var(--radius-md); font-size:calc(12.5px * var(--font-scale));
  font-weight:600; line-height:1.5;
}

/* ── SVG Node animations ── */
.node-active { animation: node-pulse 1s ease-in-out infinite; }
.node-visited { animation: pop-in 0.35s var(--ease) forwards; }

/* ── Sort bars ── */
.sort-bar {
  border-radius:5px 5px 0 0; display:flex; align-items:flex-start;
  justify-content:center; padding-top:5px; font-size:11px; font-weight:700; color:#fff;
  transition: height 0.3s var(--ease), background 0.25s var(--ease);
  min-width:28px;
}

/* ── Info panel ── */
.info-panel {
  background:var(--accent-bg); border-radius:var(--radius-md); padding:11px 15px;
  font-size:calc(13px * var(--font-scale)); color:var(--accent2);
  margin-top:12px; font-weight:600; border:1px solid var(--accent-border);
}

/* ── Animations ── */
@keyframes pulse-box {
  0%,100% { box-shadow: 0 0 0 0 transparent; }
  50%      { box-shadow: 0 0 12px 2px rgba(99,102,241,0.4); }
}
@keyframes pop-in {
  0%   { transform:scale(0.85); opacity:0.6; }
  60%  { transform:scale(1.08); }
  100% { transform:scale(1); opacity:1; }
}
@keyframes fade-slide-up {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes node-pulse {
  0%,100% { filter:drop-shadow(0 0 0px transparent); }
  50%      { filter:drop-shadow(0 0 8px rgba(99,102,241,0.8)); }
}
@keyframes blink {
  50% { opacity:0; }
}
@keyframes shimmer {
  0%   { background-position:200% center; }
  100% { background-position:-200% center; }
}

.fade-in { animation: fade-slide-up 0.35s var(--ease) both; }

/* ── Info pill ── */
.hint-pill {
  display:inline-flex; align-items:center; gap:5px;
  font-size:calc(11.5px * var(--font-scale)); color:var(--text-3);
  background:var(--bg-surface); border:1px solid var(--border);
  border-radius:99px; padding:3px 11px;
}

/* ── Topic tag colors ── */
.tag-linear  { background:var(--blue-bg); color:var(--blue); }
.tag-hash    { background:var(--accent-bg); color:var(--accent2); }
.tag-search  { background:var(--green-bg); color:var(--green); }
.tag-sort    { background:var(--yellow-bg); color:var(--yellow); }
.tag-tech    { background:var(--accent-bg); color:var(--accent2); }
.tag-string  { background:var(--red-bg); color:var(--red); }
.tag-tree    { background:var(--yellow-bg); color:var(--yellow); }
.tag-graph   { background:var(--yellow-bg); color:var(--yellow); }
.tag-adv     { background:var(--red-bg); color:var(--red); }
.tag-ref     { background:var(--green-bg); color:var(--green); }

/* ── Input fields inside viz ── */
.viz-input {
  font-size:calc(12px * var(--font-scale)); padding:6px 10px;
  border:1px solid var(--border-med); border-radius:var(--radius-md);
  background:var(--bg-surface); color:var(--text-1); outline:none;
  transition:border-color 0.18s var(--ease); font-family:var(--font-sans);
  width:90px;
}
.viz-input:focus { border-color:var(--accent-border); box-shadow:0 0 0 3px var(--accent-bg); }
/* ── Code Lab Button ── */
.lab-btn {
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  color:#fff;border:none;border-radius:var(--radius-md);
  font-size:12.5px;font-weight:700;font-family:var(--font-sans);
  cursor:pointer;transition:opacity 0.2s,transform 0.15s;
  box-shadow:0 2px 10px rgba(99,102,241,0.35);
}
.lab-btn:hover{opacity:0.88;transform:translateY(-1px);}

/* ── Code Lab Modal ── */
.lab-modal { position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center; }
.lab-overlay { position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px); }
.lab-panel {
  position:relative;width:96vw;max-width:1400px;height:90vh;
  background:var(--bg-surface);border:1px solid var(--border-med);
  border-radius:16px;display:flex;flex-direction:column;
  box-shadow:0 32px 80px rgba(0,0,0,0.6);overflow:hidden;
  animation:fade-slide-up 0.25s var(--ease);
}

/* ── Lab Header ── */
.lab-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);
  background:var(--bg-card);flex-shrink:0;
}
.lab-run-btn {
  display:flex;align-items:center;gap:6px;padding:8px 18px;
  background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);
  font-size:13px;font-weight:700;font-family:var(--font-sans);cursor:pointer;
  transition:opacity 0.2s;
}
.lab-run-btn:hover{opacity:0.85;}
.lab-run-btn.running { background:var(--yellow);animation:pulse-box 1s infinite; }
.lab-analyze-btn {
  display:flex;align-items:center;gap:6px;padding:8px 16px;
  background:var(--accent-bg);color:var(--accent2);border:1.5px solid var(--accent);
  border-radius:var(--radius-md);font-size:13px;font-weight:700;font-family:var(--font-sans);cursor:pointer;
  transition:background 0.2s;
}
.lab-analyze-btn:hover{background:rgba(99,102,241,0.2);}
.lab-close-btn {
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:var(--bg-surface);border:1px solid var(--border-med);border-radius:var(--radius-md);
  color:var(--text-2);cursor:pointer;font-size:15px;transition:background 0.15s;
}
.lab-close-btn:hover{background:var(--red-bg);color:var(--red);}

/* ── Language Bar ── */
.lab-lang-bar {
  display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  border-bottom:1px solid var(--border);background:var(--bg-card);flex-shrink:0;
}
.lab-lang-tabs { display:flex;gap:4px;flex-wrap:wrap; }
.lab-lang-tab {
  padding:5px 12px;border:1.5px solid var(--border-med);border-radius:var(--radius-md);
  font-size:12px;font-weight:600;font-family:var(--font-sans);
  background:transparent;color:var(--text-2);cursor:pointer;transition:all 0.15s;
}
.lab-lang-tab:hover{border-color:var(--accent);color:var(--accent2);}
.lab-lang-tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2);}
.lab-small-btn {
  display:flex;align-items:center;gap:5px;padding:5px 10px;
  background:var(--bg-surface);border:1px solid var(--border-med);border-radius:var(--radius-md);
  font-size:11.5px;font-weight:600;font-family:var(--font-sans);color:var(--text-2);cursor:pointer;
  transition:all 0.15s;
}
.lab-small-btn:hover{border-color:var(--accent);color:var(--accent2);}

/* ── Body layout ── */
.lab-body { display:flex;flex:1;overflow:hidden;gap:0; }

/* ── Editor Pane ── */
.lab-editor-pane { flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0; }
.lab-editor-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;
}
.lab-editor-wrap { position:relative;flex:1;overflow:hidden;display:flex; }
.lab-linenos {
  width:44px;min-width:44px;padding:14px 8px;
  font-family:var(--font-mono);font-size:13px;line-height:1.75;
  color:var(--text-3);text-align:right;background:var(--bg-card);
  border-right:1px solid var(--border);white-space:pre;
  overflow:hidden;user-select:none;flex-shrink:0;
}
.lab-hl-layer {
  position:absolute;left:44px;right:0;top:0;bottom:0;
  padding:14px 16px;font-family:var(--font-mono);font-size:13px;
  line-height:1.75;white-space:pre;overflow:hidden;
  pointer-events:none;color:var(--text-1);background:transparent;
  word-wrap:normal;tab-size:2;
}
.lab-textarea {
  position:absolute;left:44px;right:0;top:0;bottom:0;
  padding:14px 16px;font-family:var(--font-mono);font-size:13px;
  line-height:1.75;white-space:pre;overflow:auto;
  background:transparent;color:transparent;border:none;outline:none;
  resize:none;caret-color:var(--accent2);tab-size:2;
  word-wrap:normal;z-index:2;
}
.lab-hl-layer { z-index:1; }
/* Show highlight spans in hl-layer — inherit colors from token spans */
.lab-hl-layer .hl-kw     { color:var(--code-kw);font-weight:600; }
.lab-hl-layer .hl-str    { color:var(--code-str); }
.lab-hl-layer .hl-num    { color:var(--code-num); }
.lab-hl-layer .hl-comment{ color:var(--code-cmt);font-style:italic; }
.lab-hl-layer .hl-fn     { color:var(--code-fn); }
.lab-hl-layer .hl-type   { color:var(--code-type); }
.lab-hl-layer .hl-bracket{ color:var(--accent2); }
.lab-hl-layer .hl-annotation{ color:var(--yellow); }

/* ── Right Pane ── */
.lab-right-pane { width:380px;min-width:300px;display:flex;flex-direction:column;overflow:hidden; }
.lab-output-section { flex:1;display:flex;flex-direction:column;border-bottom:1px solid var(--border);overflow:hidden; }
.lab-complexity-section { flex:1;display:flex;flex-direction:column;overflow:auto; }
.lab-section-hdr {
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);
  font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;
  flex-shrink:0;
}
.lab-output {
  flex:1;padding:14px 16px;font-family:var(--font-mono);font-size:12.5px;
  line-height:1.7;overflow:auto;white-space:pre-wrap;word-break:break-word;
  color:var(--text-1);background:var(--bg-base);
}
.lab-output.error { color:var(--red); }
#labComplexity { padding:14px 16px;overflow:auto; }

/* ── Complexity cards ── */
.cx-card {
  background:var(--bg-card);border:1px solid var(--border-med);border-radius:var(--radius-md);
  padding:12px 14px;margin-bottom:10px;
}
.cx-title { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:8px; }
.cx-big { font-size:26px;font-weight:800;font-family:var(--font-mono);margin-bottom:4px; }
.cx-reason { font-size:12px;color:var(--text-2);line-height:1.5; }
.cx-detail { margin-top:10px; }
.cx-detail-row {
  display:flex;align-items:flex-start;gap:8px;padding:6px 0;
  border-top:1px solid var(--border);font-size:12px;color:var(--text-2);
}
.cx-icon { font-size:14px;margin-top:1px;flex-shrink:0; }
.cx-o1 { color:var(--green); }
.cx-ologn { color:var(--blue); }
.cx-on { color:var(--accent2); }
.cx-on2 { color:var(--yellow); }
.cx-o2n { color:var(--red); }
.cx-tip {
  background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--radius-md);
  padding:10px 12px;font-size:12px;color:var(--accent2);line-height:1.5;margin-top:10px;
}

@keyframes confettiFall {
  0%   { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="ti ti-code"></i></div>
        DSA Academy
      </div>
      <div class="sidebar-sub">Java &amp; Kotlin · Interactive</div>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Search topics…" id="searchInput" oninput="filterNav()">
      </div>
    </div>

    <div class="nav-list" id="navList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h1 id="topicTitle">Arrays</h1>
      <div class="topbar-right">
        <div class="lang-tabs">
          <button class="lang-tab active" onclick="setLang('java',this)">Java</button>
          <button class="lang-tab" onclick="setLang('kotlin',this)">Kotlin</button>
        </div>
        <div class="font-controls">
          <button class="font-btn" onclick="changeFontSize(-1)" title="Decrease"><i class="ti ti-minus"></i></button>
          <span class="font-indicator" id="fontSizeLabel" onclick="resetFontSize()" title="Reset">100%</span>
          <button class="font-btn" onclick="changeFontSize(1)" title="Increase"><i class="ti ti-plus"></i></button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <i class="ti ti-sun" id="themeIcon"></i>
        </button>
        <button class="lab-btn" onclick="openCodeLab()" title="Code Lab">
          <i class="ti ti-terminal-2"></i> Code Lab
        </button>
      </div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>
</div>

<!-- ===== CODE LAB MODAL ===== -->
<div id="codeLabModal" class="lab-modal" style="display:none">
  <div class="lab-overlay" onclick="closeCodeLab()"></div>
  <div class="lab-panel">
    <div class="lab-header">
      <div style="display:flex;align-items:center;gap:10px">
        <i class="ti ti-terminal-2" style="font-size:18px;color:var(--accent2)"></i>
        <span style="font-size:16px;font-weight:700;color:var(--text-1)">Code Lab</span>
        <span style="font-size:11px;color:var(--text-3);font-family:var(--font-mono);background:var(--accent-bg);padding:2px 8px;border-radius:99px">Powered by Piston API</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="lab-run-btn" onclick="runLabCode()"><i class="ti ti-player-play"></i> Run</button>
        <button class="lab-analyze-btn" onclick="analyzeLabComplexity()"><i class="ti ti-brain"></i> Analyze Complexity</button>
        <button class="lab-close-btn" onclick="closeCodeLab()"><i class="ti ti-x"></i></button>
      </div>
    </div>

    <!-- Language selector -->
    <div class="lab-lang-bar">
      <div class="lab-lang-tabs" id="labLangTabs">
        <button class="lab-lang-tab active" data-lang="java" onclick="setLabLang(this)">☕ Java</button>
        <button class="lab-lang-tab" data-lang="kotlin" onclick="setLabLang(this)">🎯 Kotlin</button>
        <button class="lab-lang-tab" data-lang="python" onclick="setLabLang(this)">🐍 Python</button>
        <button class="lab-lang-tab" data-lang="javascript" onclick="setLabLang(this)">🟨 JavaScript</button>
        <button class="lab-lang-tab" data-lang="cpp" onclick="setLabLang(this)">⚙️ C++</button>
        <button class="lab-lang-tab" data-lang="c" onclick="setLabLang(this)">🔧 C</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="lab-small-btn" onclick="labAutoIndent()" title="Auto-indent code"><i class="ti ti-indent-increase"></i> Auto Indent</button>
        <button class="lab-small-btn" onclick="labClearEditor()" title="Clear"><i class="ti ti-trash"></i> Clear</button>
        <button class="lab-small-btn" onclick="labLoadTemplate()" title="Load template"><i class="ti ti-template"></i> Template</button>
      </div>
    </div>

    <!-- Editor + output row -->
    <div class="lab-body">
      <!-- Editor pane -->
      <div class="lab-editor-pane">
        <div class="lab-editor-header">
          <span style="color:var(--text-3);font-size:11px;font-family:var(--font-mono)">main.<span id="labExt">java</span></span>
          <span id="labCursorPos" style="color:var(--text-3);font-size:11px;font-family:var(--font-mono)">Ln 1, Col 1</span>
        </div>
        <div class="lab-editor-wrap">
          <div class="lab-linenos" id="labLineNos">1</div>
          <div class="lab-hl-layer" id="labHlLayer" aria-hidden="true"></div>
          <textarea class="lab-textarea" id="labCode" spellcheck="false" autocomplete="off" autocorrect="off"
            oninput="onLabInput()" onscroll="syncLabScroll()" onkeydown="labKeyDown(event)"
            onclick="updateLabCursor()" onkeyup="updateLabCursor()"
            placeholder="Write your code here…"></textarea>
        </div>
      </div>

      <!-- Right pane: output + complexity -->
      <div class="lab-right-pane">
        <!-- Output -->
        <div class="lab-output-section">
          <div class="lab-section-hdr">
            <span><i class="ti ti-terminal"></i> Output</span>
            <span id="labExecTime" style="font-size:11px;font-family:var(--font-mono);color:var(--text-3)"></span>
          </div>
          <div class="lab-output" id="labOutput">
            <span style="color:var(--text-3);font-size:12px">Press ▶ Run to execute your code…</span>
          </div>
        </div>

        <!-- Complexity -->
        <div class="lab-complexity-section">
          <div class="lab-section-hdr">
            <span><i class="ti ti-brain"></i> Complexity Analysis</span>
          </div>
          <div id="labComplexity">
            <span style="color:var(--text-3);font-size:12px">Click "Analyze Complexity" to get a detailed report…</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const TOPICS = [
  {cat:"Fundamentals",items:[
    {id:"arrays",name:"Arrays",tag:"Linear",tagCls:"tag-linear",color:"badge-b",

    {id:"binary-search",name:"Binary Search",tag:"Search",tagCls:"tag-search",color:"badge-g",
     desc:"Finds an element in a sorted array by repeatedly halving the search space. O(log n) time. The array must be sorted.",
     stats:[{l:"Time",v:"O(log n)"},{l:"Space",v:"O(1)"},{l:"Requires",v:"Sorted"},{l:"Best",v:"O(1)"}],
     java:`int binarySearch(int[] arr, int target) {
    int lo = 0, hi = arr.length - 1;
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2; // avoids overflow
        if (arr[mid] == target) return mid;
        else if (arr[mid] < target) lo = mid + 1; // search right
        else hi = mid - 1;                         // search left
    }
    return -1; // not found
}`,
     kotlin:`fun binarySearch(arr: IntArray, target: Int): Int {
    var lo = 0; var hi = arr.lastIndex
    while (lo <= hi) {
        val mid = lo + (hi - lo) / 2
        when {
            arr[mid] == target -> return mid
            arr[mid] < target -> lo = mid + 1
            else -> hi = mid - 1
        }
    }
    return -1
}`,viz:"bsearch"},

    {id:"bubble-sort",name:"Bubble Sort",tag:"Sort",tagCls:"tag-sort",color:"badge-y",
     desc:"Repeatedly swaps adjacent elements if out of order. Simple but O(n²). Useful for teaching; rarely used in production.",
     stats:[{l:"Best",v:"O(n)"},{l:"Average",v:"O(n²)"},{l:"Worst",v:"O(n²)"},{l:"Space",v:"O(1)"}],
     java:`void bubbleSort(int[] arr) {
    int n = arr.length;
    for (int i = 0; i < n - 1; i++) {
        boolean swapped = false;
        for (int j = 0; j < n - i - 1; j++) {
            if (arr[j] > arr[j+1]) {
                int tmp = arr[j]; arr[j] = arr[j+1]; arr[j+1] = tmp;
                swapped = true;
            }
        }
        if (!swapped) break; // already sorted — O(n) best case
    }
}`,
     kotlin:`fun bubbleSort(arr: IntArray) {

    {id:"merge-sort",name:"Merge Sort",tag:"Sort",tagCls:"tag-sort",color:"badge-g",
     desc:"Divide-and-conquer: split array into halves, sort each recursively, then merge. Stable sort, O(n log n) always.",
     stats:[{l:"Best",v:"O(n log n)"},{l:"Average",v:"O(n log n)"},{l:"Worst",v:"O(n log n)"},{l:"Space",v:"O(n)"}],
     java:`void mergeSort(int[] arr, int l, int r) {
    if (l >= r) return;
    int m = (l + r) / 2;
    mergeSort(arr, l, m);
    mergeSort(arr, m+1, r);
    merge(arr, l, m, r);
}
void merge(int[] arr, int l, int m, int r) {
    int[] left = Arrays.copyOfRange(arr, l, m+1);
    int[] right = Arrays.copyOfRange(arr, m+1, r+1);
    int i = 0, j = 0, k = l;
    while (i < left.length && j < right.length)
        arr[k++] = left[i] <= right[j] ? left[i++] : right[j++];
    while (i < left.length) arr[k++] = left[i++];
    while (j < right.length) arr[k++] = right[j++];
}`,
     kotlin:`fun mergeSort(arr: IntArray, l: Int, r: Int) {
    if (l >= r) return
    val m = (l + r) / 2
    mergeSort(arr, l, m); mergeSort(arr, m+1, r); merge(arr, l, m, r)
}
fun merge(arr: IntArray, l: Int, m: Int, r: Int) {
    val left = arr.copyOfRange(l, m+1); val right = arr.copyOfRange(m+1, r+1)
    var i = 0; var j = 0; var k = l
    while (i < left.size && j < right.size)
        arr[k++] = if (left[i] <= right[j]) left[i++] else right[j++]
    while (i < left.size) arr[k++] = left[i++]
    while (j < right.size) arr[k++] = right[j++]
}`,viz:"msort"},

    {id:"quick-sort",name:"Quick Sort",tag:"Sort",tagCls:"tag-sort",color:"badge-g",
     desc:"Picks a pivot, partitions array around it, recursively sorts each partition. Average O(n log n), but O(n²) worst case with bad pivots.",
     stats:[{l:"Best",v:"O(n log n)"},{l:"Average",v:"O(n log n)"},{l:"Worst",v:"O(n²)"},{l:"Space",v:"O(log n)"}],
     java:`void quickSort(int[] arr, int lo, int hi) {
    if (lo < hi) {
        int p = partition(arr, lo, hi);
        quickSort(arr, lo, p-1);
        quickSort(arr, p+1, hi);
    }
}
int partition(int[] arr, int lo, int hi) {
    int pivot = arr[hi], i = lo-1;
    for (int j = lo; j < hi; j++) {
        if (arr[j] <= pivot) {
            i++;
            int tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
        }
    }
    int tmp = arr[i+1]; arr[i+1] = arr[hi]; arr[hi] = tmp;
    return i+1;
}`,
     kotlin:`fun quickSort(arr: IntArray, lo: Int, hi: Int) {
    if (lo < hi) {
        val p = partition(arr, lo, hi)
        quickSort(arr, lo, p-1); quickSort(arr, p+1, hi)
    }
}
fun partition(arr: IntArray, lo: Int, hi: Int): Int {
    val pivot = arr[hi]; var i = lo-1
    for (j in lo until hi)
        if (arr[j] <= pivot) { i++; arr[i] = arr[j].also { arr[j] = arr[i] } }
    arr[i+1] = arr[hi].also { arr[hi] = arr[i+1] }
    return i+1
}`,viz:"qsort"},

    if (n <= 1) return 1; // base case — stops recursion

int fib(int n, int[] memo) {
    if (n <= 1) return n;
    if (memo[n] != 0) return memo[n]; // cache hit
    memo[n] = fib(n-1, memo) + fib(n-2, memo);
    return memo[n];
}

    {id:"dynamic-programming",name:"Dynamic Programming",tag:"Technique",tagCls:"tag-tech",color:"badge-b",
     desc:"Solves problems by breaking into overlapping subproblems and storing results. Tabulation (bottom-up) or memoization (top-down).",
     stats:[{l:"LCS",v:"O(mn)"},{l:"Knapsack",v:"O(nW)"},{l:"Coin change",v:"O(nA)"},{l:"Space trade",v:"Time↓"}],
     java:`import java.util.Arrays;

int coinChange(int[] coins, int amount) {
    int[] dp = new int[amount+1];
    Arrays.fill(dp, amount+1);
    dp[0] = 0;
    for (int a = 1; a <= amount; a++)
        for (int c : coins)
            if (c <= a) dp[a] = Math.min(dp[a], dp[a-c]+1);
    return dp[amount] > amount ? -1 : dp[amount];
}

int lcs(String a, String b) {
    int m = a.length(), n = b.length();
    int[][] dp = new int[m+1][n+1];
    for (int i=1; i<=m; i++)
        for (int j=1; j<=n; j++)
            dp[i][j] = a.charAt(i-1)==b.charAt(j-1)
                ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
    return dp[m][n];
}`,
     kotlin:`fun coinChange(coins: IntArray, amount: Int): Int {
    val dp = IntArray(amount+1) { amount+1 }
    dp[0] = 0
    for (a in 1..amount)
        for (c in coins) if (c <= a) dp[a] = minOf(dp[a], dp[a-c]+1)
    return if (dp[amount] > amount) -1 else dp[amount]
}

fun lcs(a: String, b: String): Int {
    val dp = Array(a.length+1) { IntArray(b.length+1) }
    for (i in 1..a.length)
        for (j in 1..b.length)
            dp[i][j] = if (a[i-1]==b[j-1]) dp[i-1][j-1]+1 else maxOf(dp[i-1][j],dp[i][j-1])
    return dp[a.length][b.length]
}`,viz:"dp"},

    {id:"sliding-window",name:"Sliding Window",tag:"Technique",tagCls:"tag-tech",color:"badge-b",
     desc:"Uses two pointers to maintain a window over an array or string, expanding/shrinking to track constraints. Converts O(n²) to O(n).",
     stats:[{l:"Time",v:"O(n)"},{l:"Space",v:"O(1)–O(k)"},{l:"Pattern",v:"Two pointers"},{l:"Use case",v:"Subarrays"}],
     java:`import java.util.HashMap;

int maxSumWindow(int[] arr, int k) {
    int sum = 0, maxSum = 0;
    for (int i = 0; i < k; i++) sum += arr[i];
    maxSum = sum;
    for (int i = k; i < arr.length; i++) {
        sum += arr[i] - arr[i-k]; // slide: add right, drop left
        maxSum = Math.max(maxSum, sum);
    }
    return maxSum;
}

int lengthOfLongest(String s) {
    HashMap<Character,Integer> map = new HashMap<>();
    int max = 0, left = 0;
    for (int r = 0; r < s.length(); r++) {
        char c = s.charAt(r);
        if (map.containsKey(c)) left = Math.max(left, map.get(c)+1);
        map.put(c, r);
        max = Math.max(max, r-left+1);
    }
    return max;
}`,
     kotlin:`fun maxSumWindow(arr: IntArray, k: Int): Int {
    var sum = arr.take(k).sum(); var maxSum = sum
    for (i in k until arr.size) { sum += arr[i]-arr[i-k]; maxSum = maxOf(maxSum,sum) }
    return maxSum
}

    {id:"backtracking",name:"Backtracking",tag:"Technique",tagCls:"tag-tech",color:"badge-b",
     desc:"Explores all possibilities by incrementally building candidates and abandoning branches that can't lead to valid solutions.",
     stats:[{l:"Permutations",v:"O(n!)"},{l:"Subsets",v:"O(2ⁿ)"},{l:"N-Queens",v:"O(n!)"},{l:"Strategy",v:"Prune early"}],
     java:`import java.util.*;

void permutations(int[] nums, List<Integer> curr,
                  boolean[] used, List<List<Integer>> res) {
    if (curr.size() == nums.length) { res.add(new ArrayList<>(curr)); return; }
    for (int i = 0; i < nums.length; i++) {
        if (used[i]) continue;
        used[i] = true; curr.add(nums[i]);
        permutations(nums, curr, used, res);
        curr.remove(curr.size()-1); used[i] = false; // backtrack
    }
}`,
     kotlin:`fun permutations(nums: IntArray, curr: MutableList<Int>,
    used: BooleanArray, res: MutableList<List<Int>>) {
    if (curr.size == nums.size) { res.add(curr.toList()); return }
    for (i in nums.indices) {
        if (used[i]) continue
        used[i] = true; curr.add(nums[i])
        permutations(nums, curr, used, res)
        curr.removeLast(); used[i] = false // backtrack
    }
}`,viz:"btrack"},

    {id:"greedy",name:"Greedy Algorithms",tag:"Technique",tagCls:"tag-tech",color:"badge-b",
     desc:"Makes the locally optimal choice at each step hoping to find the global optimum. Works when greedy choice property and optimal substructure hold.",
     stats:[{l:"Activity sel.",v:"O(n log n)"},{l:"Huffman",v:"O(n log n)"},{l:"Coin change",v:"O(n/d)"},{l:"Provability",v:"Proof needed"}],
     java:`import java.util.Arrays;

int activitySelection(int[] start, int[] end) {
    int count = 1, lastEnd = end[0];
    for (int i = 1; i < start.length; i++)
        if (start[i] >= lastEnd) { count++; lastEnd = end[i]; }
    return count;
}

double fractionalKnapsack(int[] w, int[] v, int cap) {
    Integer[] idx = new Integer[w.length];
    for (int i=0;i<w.length;i++) idx[i]=i;
    Arrays.sort(idx,(a,b)->Double.compare((double)v[b]/w[b],(double)v[a]/w[a]));
    double total = 0;
    for (int i : idx) {
        if (cap >= w[i]) { total += v[i]; cap -= w[i]; }
        else { total += (double)v[i]/w[i]*cap; break; }
    }
    return total;
}`,
     kotlin:`fun activitySelection(start: IntArray, end: IntArray): Int {
    var count = 1; var lastEnd = end[0]
    for (i in 1 until start.size)
        if (start[i] >= lastEnd) { count++; lastEnd = end[i] }
    return count
}`,viz:"greedy"},

    {id:"dijkstra",name:"Dijkstra",tag:"Graph",tagCls:"tag-graph",color:"badge-y",
     desc:"Finds shortest paths from a source to all nodes in a weighted graph with non-negative edges. Uses a min-heap priority queue for efficiency.",

     java:`import java.util.*;

int[] dijkstra(int n, int[][] edges, int src) {
    List<int[]>[] graph = new List[n];
    for(int i=0;i<n;i++) graph[i]=new ArrayList<>();
    for(int[] e:edges) { graph[e[0]].add(new int[]{e[1],e[2]}); graph[e[1]].add(new int[]{e[0],e[2]}); }
    int[] dist = new int[n]; Arrays.fill(dist, Integer.MAX_VALUE); dist[src]=0;
    PriorityQueue<int[]> pq = new PriorityQueue<>(Comparator.comparingInt(a->a[0]));
    pq.offer(new int[]{0,src});
    while (!pq.isEmpty()) {
        int[] cur=pq.poll(); int d=cur[0],u=cur[1];
        if (d>dist[u]) continue; // stale entry
        for (int[] nb:graph[u]) {
            int nd=dist[u]+nb[1];
            if (nd<dist[nb[0]]) { dist[nb[0]]=nd; pq.offer(new int[]{nd,nb[0]}); }
        }
    }
    return dist;
}`,
     kotlin:`import java.util.PriorityQueue

fun dijkstra(n: Int, edges: Array<IntArray>, src: Int): IntArray {
    val graph = Array(n){mutableListOf<Pair<Int,Int>>()}
    for((u,v,w) in edges) { graph[u]+=Pair(v,w); graph[v]+=Pair(u,w) }
    val dist = IntArray(n){Int.MAX_VALUE}; dist[src]=0
    val pq = PriorityQueue<Pair<Int,Int>>(compareBy{it.first}); pq.offer(Pair(0,src))
    while(pq.isNotEmpty()) {
        val(d,u)=pq.poll(); if(d>dist[u]) continue
        for((v,w) in graph[u]) { val nd=dist[u]+w; if(nd<dist[v]){dist[v]=nd;pq.offer(Pair(nd,v))} }
    }
    return dist
}`,viz:"dijkstra"},

    {id:"topo-sort",name:"Topological Sort",tag:"Graph",tagCls:"tag-graph",color:"badge-y",
     desc:"Orders nodes in a DAG such that every directed edge u→v has u before v. Used for build systems, task scheduling, and dependency resolution.",
     stats:[{l:"Time",v:"O(V+E)"},{l:"Space",v:"O(V)"},{l:"Requires",v:"DAG (no cycles)"},{l:"Methods",v:"Kahn / DFS"}],
     java:`import java.util.*;

List<Integer> topoSort(int n, int[][] edges) {
    List<List<Integer>> adj = new ArrayList<>();
    for(int i=0;i<n;i++) adj.add(new ArrayList<>());
    int[] indegree = new int[n];
    for(int[] e:edges) { adj.get(e[0]).add(e[1]); indegree[e[1]]++; }
    Queue<Integer> q = new LinkedList<>();
    for(int i=0;i<n;i++) if(indegree[i]==0) q.offer(i);
    List<Integer> order = new ArrayList<>();
    while(!q.isEmpty()) {
        int u=q.poll(); order.add(u);
        for(int v:adj.get(u)) if(--indegree[v]==0) q.offer(v);
    }
    return order.size()==n ? order : List.of();
}`,
     kotlin:`fun topoSort(n: Int, edges: Array<IntArray>): List<Int> {
    val adj=Array(n){mutableListOf<Int>()}; val indegree=IntArray(n)
    for((u,v) in edges){adj[u].add(v);indegree[v]++}
    val q:Queue<Int>=java.util.LinkedList()
    for(i in 0 until n) if(indegree[i]==0) q.offer(i)
    val order=mutableListOf<Int>()
    while(q.isNotEmpty()){val u=q.poll();order.add(u);for(v in adj[u]) if(--indegree[v]==0) q.offer(v)}
    return if(order.size==n) order else emptyList()
}`,viz:"tsort"},

     java:`class UnionFind {
    int[] parent, rank;
    UnionFind(int n) {
        parent=new int[n]; rank=new int[n];
        for(int i=0;i<n;i++) parent[i]=i;
    }
    int find(int x) {
        if (parent[x]!=x) parent[x]=find(parent[x]); // path compression
        return parent[x];
    }
    boolean union(int x, int y) {
        int px=find(x), py=find(y);
        if (px==py) return false;
        if (rank[px]<rank[py]) { int t=px;px=py;py=t; }
        parent[py]=px;
        if (rank[px]==rank[py]) rank[px]++;
        return true;
    }
    boolean connected(int x,int y){return find(x)==find(y);}

function buildNav() {
  const nl = document.getElementById('navList');
  nl.innerHTML = '';
  TOPICS.forEach(cat => {
    const ce = document.createElement('div');
    ce.className = 'nav-cat'; ce.textContent = cat.cat; nl.appendChild(ce);
    cat.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (item.id === currentTopic.id ? ' active' : '');
      el.dataset.id = item.id;
      el.innerHTML = `<span>${item.name}</span><span class="nav-badge">${item.tag}</span>`;
      el.onclick = () => selectTopic(item.id);
      nl.appendChild(el);
    });
  });
}

function filterNav() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const children = Array.from(document.getElementById('navList').children);
  let cat = null, hasVis = false;
  children.forEach(el => {
    if (el.classList.contains('nav-cat')) {
      if (cat) cat.style.display = hasVis ? '' : 'none';
      cat = el; hasVis = false;
    } else {
      const m = el.textContent.toLowerCase().includes(q);
      el.style.display = m ? '' : 'none';
      if (m) hasVis = true;
    }
  });
  if (cat) cat.style.display = hasVis ? '' : 'none';
}

function selectTopic(id) {
  for (const cat of TOPICS) for (const item of cat.items) if (item.id === id) { currentTopic = item; break; }
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  document.getElementById('topicTitle').textContent = currentTopic.name;
  renderContent();
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(b => b.classList.toggle('active', b === btn));
  renderContent();
}

// ============================================================
// SVG HELPERS
// ============================================================
function makeSVG(w, h, inner) {
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible;display:block">${inner}</svg>`;
}

function svgNode(cx, cy, r, label, state, pulse) {
  const colors = {
    default: {fill:'var(--bg-surface)',stroke:'var(--border-med)',text:'var(--text-1)'},
    active:  {fill:'var(--accent-bg)',stroke:'var(--accent)',text:'var(--accent2)'},
    visited: {fill:'var(--green-bg)',stroke:'var(--green)',text:'var(--green)'},
    found:   {fill:'var(--green-bg)',stroke:'var(--green)',text:'var(--green)'},
    pivot:   {fill:'var(--yellow-bg)',stroke:'var(--yellow)',text:'var(--yellow)'},
    end:     {fill:'var(--yellow-bg)',stroke:'var(--yellow)',text:'var(--yellow)'},
  };
  const c = colors[state] || colors.default;
  const glow = (state === 'active' && pulse) ? 
    `<animate attributeName="r" values="${r};${r+2};${r}" dur="1.2s" repeatCount="indefinite"/>
     <filter id="gf"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>` : '';
  const filterAttr = (state === 'active' && pulse) ? 'filter="url(#gf)"' : '';
  return `<defs>${glow}</defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="2.5" ${filterAttr}/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="${c.text}" font-size="${r > 15 ? 11 : 9}" font-weight="700" font-family="var(--font-sans)">${label}</text>`;
}

function svgEdge(x1,y1,x2,y2,active,weighted,w) {
  const stroke = active ? 'var(--green)' : 'var(--border-med)';
  const sw = active ? 2.5 : 1.8;
  let line = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${sw}"/>`;
  if (weighted) {
    const mx=(x1+x2)/2, my=(y1+y2)/2-5;
    line += `<text x="${mx}" y="${my}" text-anchor="middle" fill="var(--yellow)" font-size="10" font-weight="700" font-family="var(--font-mono)">${w}</text>`;
  }
  return line;
}

function svgArrow(x1,y1,x2,y2,active) {
  const stroke = active ? 'var(--accent)' : 'var(--border-med)';
  const sw = active ? 2.5 : 1.8;
  const dx=x2-x1, dy=y2-y1;
  const len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len, uy=dy/len;
  const ax=x2-ux*10, ay=y2-uy*10;
  const perpx=-uy*5, perpy=ux*5;
  return `<line x1="${x1}" y1="${y1}" x2="${ax}" y2="${ay}" stroke="${stroke}" stroke-width="${sw}"/>
    <polygon points="${x2},${y2} ${ax+perpx},${ay+perpy} ${ax-perpx},${ay-perpy}" fill="${stroke}"/>`;
}

    const isTop=i===0;
    return `<div style="width:90px;height:38px;display:flex;align-items:center;justify-content:center;
      border:2px solid ${isTop?'var(--accent)':'var(--border-med)'};border-radius:var(--radius-md);

      color:${isTop?'var(--accent2)':'var(--text-1)'};position:relative;
      animation:${isTop&&stackData.length>0?'pop-in 0.3s var(--ease)':''}">${v}${isTop?'<span style="position:absolute;right:-46px;font-size:10px;color:var(--accent2);font-weight:700">← top</span>':''}</div>`;

}

// HASHMAP VIZ
// ============================================================
let hmBuckets = Array.from({length:8},()=>[]);

function initHM(){
  hmBuckets=Array.from({length:8},()=>[]);
  ['apple','banana','grape','orange'].forEach((k,i)=>putHM(k,i*15+10));
  renderHMViz(-1,'','',false);
  const l=document.getElementById('hmLog'); if(l) l.textContent='HashMap seeded. Enter Key + Value to Put, or Key to Get.';
}
function hashFn(k){ let h=0; for(let c of String(k)) h=(h*31+c.charCodeAt(0))%8; return h; }
function putHM(k,v){ const h=hashFn(k),b=hmBuckets[h],e=b.find(x=>x.key===k); if(e) e.value=v; else b.push({key:k,value:v}); }
function getHM(k){ const h=hashFn(k); return hmBuckets[h].find(x=>x.key===k)?.value ?? null; }
function hmPut(){ const k=document.getElementById('hmKey')?.value.trim(), v=document.getElementById('hmVal')?.value.trim(); if(!k||!v){const l=document.getElementById('hmLog');if(l)l.textContent='Enter both key and value';return;} const h=hashFn(k); putHM(k,v); renderHMViz(h,k,'put',true); document.getElementById('hmKey').value=''; document.getElementById('hmVal').value=''; }
function hmGet(){ const k=document.getElementById('hmKey')?.value.trim(); if(!k)return; const h=hashFn(k),val=getHM(k); renderHMViz(h,k,'get',val!==null); }

function renderHMViz(hl=-1,hlk='',action='',found=false){
  const viz=document.getElementById('hmViz'); if(!viz) return;
  const l=document.getElementById('hmLog');
  if(action==='put'&&l) l.textContent=`hash("${hlk}") = ${hl} → stored in Bucket ${hl}`;

let sortData=[], sortI=0, sortJ=0, sortDone=false;
function initBsort(){ sortData=[6,3,8,1,5,9,2,7].map(v=>({v,state:''})); sortI=0; sortJ=0; sortDone=false; clearInterval(sortTimer); renderBsortBars(); const l=document.getElementById('sortLog'); if(l) l.textContent='Press "Next Step" to begin'; }
function bsortStep(){
  const n=sortData.length;
  if(sortI>=n-1){ sortDone=true; sortData.forEach(d=>d.state='sorted'); renderBsortBars(); return; }
  sortData.forEach(d=>d.state='');
  for(let k=n-sortI-1;k<n;k++) sortData[k].state='sorted';
  if(sortJ<n-sortI-1){
    sortData[sortJ].state='compare'; sortData[sortJ+1].state='compare';
    const l=document.getElementById('sortLog');
    if(sortData[sortJ].v>sortData[sortJ+1].v){
      const t=sortData[sortJ].v; sortData[sortJ].v=sortData[sortJ+1].v; sortData[sortJ+1].v=t;
      if(l) l.textContent=`Swapped ${sortData[sortJ+1].v} ↔ ${sortData[sortJ].v}`;
    } else { if(l) l.textContent=`${sortData[sortJ].v} ≤ ${sortData[sortJ+1].v} — no swap needed`; }
    sortJ++;
  } else { sortI++; sortJ=0; }
  renderBsortBars();
}
function runBsort(){ sortTimer=setInterval(()=>{ bsortStep(); if(sortDone) clearInterval(sortTimer); },380); }

// RECURSION VIZ (call stack)
// ============================================================
let recurStack=[], recurStepCount=0, recurDone=false;
function initRecur(){ recurStack=[]; recurStepCount=0; recurDone=false; renderRecur(); const l=document.getElementById('recurLog'); if(l) l.textContent='Press "Step" to push factorial(4) onto call stack'; }
function recurStep(){
  const l=document.getElementById('recurLog');
  if(recurDone){ initRecur(); return; }
  if(recurStepCount<4){ const v=4-recurStepCount; recurStack.push({name:`factorial(${v})`,state:'active',ret:null}); recurStepCount++; if(l) l.textContent=`Pushed factorial(${v}) → recursively calling factorial(${v-1})`; }
  else if(recurStepCount===4){ recurStack[recurStack.length-1].ret=1; recurStack[recurStack.length-1].state='returned'; recurStepCount++; if(l) l.textContent='Base case! factorial(1) = 1. Unwinding starts…'; }
  else if(recurStepCount<8){ const ai=8-recurStepCount; const childVal=recurStack[ai].ret; const n=ai+1; const res=n*childVal; recurStack[ai-1].ret=res; recurStack[ai-1].state='returned'; recurStack.pop(); recurStepCount++; if(l) l.textContent=`factorial(${n}) = ${n} × ${childVal} = ${res}`; }
  else { recurDone=true; if(l) l.textContent='Unwind complete! factorial(4) = 24 ✓'; }
  renderRecur();
}
function renderRecur(){
  const viz=document.getElementById('recurViz'); if(!viz) return;
  if(!recurStack.length){ viz.innerHTML='<span style="font-size:13px;color:var(--text-3);padding:16px">Call stack is empty</span>'; return; }
  viz.innerHTML=recurStack.map((s,i)=>{
    const ret=s.state==='returned';
    return `<div style="width:200px;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;
      border:2px solid ${ret?'var(--green)':'var(--accent)'};border-radius:var(--radius-md);
      font-size:12.5px;font-weight:600;background:${ret?'var(--green-bg)':'var(--accent-bg)'};
      color:var(--text-1);animation:pop-in 0.3s var(--ease)">
      <span>${s.name}</span>
      <span style="font-size:11px;color:${ret?'var(--green)':'var(--text-3)'}">${ret?'→ '+s.ret:'waiting…'}</span>
    </div>`;
  }).join('');
}

  else if(heapStepIdx===2) { if(l) l.textContent='Step 2: Heapify-up! Swap 2 ↔ 5 (child < parent).'; }
  else if(heapStepIdx===3) { if(l) l.textContent='Step 3: 2 > 1 (parent). Min-heap property satisfied! ✓'; }
  else { initHeapViz(); return; }
  renderHeap();

function renderHeap(){
  const viz=document.getElementById('heapViz'); if(!viz) return;
  const nodeVal=(id)=>{
    if(id==='5') return heapStepIdx>=1?(heapStepIdx>=2?2:5):5;
    if(id==='2_new') return heapStepIdx>=1?(heapStepIdx>=2?5:2):null;
    return id==='1'?1:id==='3'?3:id==='9'?9:id==='6'?6:null;
  };
  const nodes=[{id:'1',cx:140,cy:15},{id:'3',cx:70,cy:60},{id:'5',cx:210,cy:60},{id:'9',cx:35,cy:110},{id:'6',cx:105,cy:110},{id:'2_new',cx:175,cy:110}];

    inner+=svgEdge(f.cx,f.cy,t.cx,t.cy,false);

// ============================================================
// SYNTAX HIGHLIGHTER
// ============================================================
function highlight(code, lang) {
  // Escape HTML first
  let c = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Use placeholders to protect strings & comments from further replacement
  // Wrap index in letters so number regex (\b\d+\b) can't match it
  const slots = [];
  const slot = s => { slots.push(s); return `\x00S${slots.length-1}E\x00`; };

  // Block comments
  c = c.replace(/\/\*[\s\S]*?\*\//g, m => slot(`<span class="hl-comment">${m}</span>`));
  // Line comments
  c = c.replace(/\/\/[^\n]*/g, m => slot(`<span class="hl-comment">${m}</span>`));
  // Template literals
  c = c.replace(/`[^`]*`/g, m => slot(`<span class="hl-str">${m}</span>`));
  // Double-quoted strings
  c = c.replace(/"(?:[^"\\]|\\.)*"/g, m => slot(`<span class="hl-str">${m}</span>`));
  // Single-quoted strings/chars
  c = c.replace(/'(?:[^'\\]|\\.)*'/g, m => slot(`<span class="hl-str">${m}</span>`));

  // Annotations: @Override, @NonNull, etc.
  // Slot immediately so later passes don't touch span attributes
  c = c.replace(/@\w+/g, m => slot(`<span class="hl-annotation">${m}</span>`));

  // Types — slot each match so keyword/fn/number passes never see the span tags
  const types = lang === 'kotlin'
    ? ['Int','String','Boolean','Long','Double','Float','Char','Byte','Short','List','MutableList','Map','HashMap','MutableMap','Set','HashSet','Array','Unit','Any','Nothing','Pair','Triple','Result']
    : ['String','Integer','Long','Double','Float','Boolean','Character','Byte','Short','Object','Void','List','ArrayList','LinkedList','Map','HashMap','TreeMap','Set','HashSet','TreeSet','Stack','Queue','Deque','ArrayDeque','PriorityQueue','Iterator','Iterable','Comparable','Comparator'];
  const typeRe = new RegExp(`\\b(${types.join('|')})\\b`, 'g');
  c = c.replace(typeRe, m => slot(`<span class="hl-type">${m}</span>`));

  // Keywords — slot immediately
  const kws = lang === 'kotlin'
    ? ['fun','val','var','if','else','when','for','while','do','return','class','object','data','sealed','enum','interface','abstract','open','override','companion','init','constructor','by','lazy','lateinit','inline','reified','suspend','coroutine','import','package','in','is','as','null','true','false','this','super','throw','try','catch','finally','let','apply','also','run','with','listOf','mapOf','setOf','arrayOf','println','print','to']
    : ['public','private','protected','static','final','abstract','class','interface','enum','extends','implements','new','return','if','else','for','while','do','switch','case','default','break','continue','void','null','true','false','import','package','this','super','instanceof','try','catch','finally','throw','throws','synchronized','volatile','transient','native','strictfp','assert','System','out','println','print'];
  const kwRe = new RegExp(`\\b(${kws.join('|')})\\b`, 'g');
  c = c.replace(kwRe, m => slot(`<span class="hl-kw">${m}</span>`));

  // Function calls — slot immediately
  c = c.replace(/\b([a-z_][a-zA-Z0-9_]*)(\s*)\(/g,
    (_, fn, sp) => slot(`<span class="hl-fn">${fn}</span>`) + sp + '(');

  // Numbers — slot immediately
  c = c.replace(/\b(\d+(?:\.\d+)?[LlFfDd]?)\b/g, m => slot(`<span class="hl-num">${m}</span>`));

  // Brackets — slot immediately
  c = c.replace(/([()[\]{}])/g, m => slot(`<span class="hl-bracket">${m}</span>`));

  // Restore all slots in one pass
  c = c.replace(/\x00S(\d+)E\x00/g, (_, i) => slots[+i]);

  return c;
}

// ============================================================
// CODE COPY & RUN
// ============================================================
function copyCode(btn) {
  const body = btn.closest('.code-block').querySelector('.code-body');
  const text = body ? body.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i> Copy'; btn.style.color = ''; }, 2000);
  }).catch(() => {
    // Fallback for non-secure context
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i> Copy'; btn.style.color = ''; }, 2000);
  });
}

function runCode() {
  const area = document.getElementById('terminalArea');
  const out = document.getElementById('terminalBody');
  if (!out) return;
  if (area) { area.style.display = 'block'; area.style.animation = 'fade-slide-up 0.3s var(--ease)'; }
  out.style.animation = 'none'; out.offsetHeight; out.style.animation = 'fade-slide-up 0.3s var(--ease)';
  const lines = (CODE_OUTPUTS[currentTopic.id] || ['// No output defined for this topic']).slice();
  out.textContent = '';
  let i = 0;
  function nextLine() {
    if (i >= lines.length) return;
    out.textContent += (i > 0 ? '\n' : '') + lines[i++];
    setTimeout(nextLine, 140 + Math.random() * 80);
  }
  nextLine();
}

function checkQuiz(ans) {
  const q = QUIZ_QUESTIONS[currentTopic.id];
  if (!q) return;
  const correct = ans === q.correct;
  document.querySelectorAll('.quiz-option').forEach((el, i) => {
    el.disabled = true;
    if (i === q.correct) el.style.background = 'var(--green-bg)', el.style.borderColor = 'var(--green)', el.style.color = 'var(--green)';
    else if (i === ans) el.style.background = 'var(--red-bg)', el.style.borderColor = 'var(--red)', el.style.color = 'var(--red)';
  });
  const res = document.getElementById('quizFeedback');
  if (res) {
    res.style.display = 'block';
    res.style.animation = 'fade-slide-up 0.3s var(--ease)';
    if (correct) { res.innerHTML = '<span style="color:var(--green)">✓ Correct! </span>' + (q.explanation || ''); spawnQuizConfetti(); }
    else res.innerHTML = '<span style="color:var(--red)">✗ Incorrect. </span>' + (q.explanation || '');
  }
}
function spawnQuizConfetti() {

    p.className = 'confetti';
    p.style.cssText = `position:fixed;top:-12px;left:${Math.random()*100}vw;width:8px;height:8px;border-radius:${Math.random()>0.5?'50%':'2px'};
      background:${['var(--accent)','var(--green)','var(--yellow)','var(--red)','var(--blue)'][Math.floor(Math.random()*5)]};
      animation:confettiFall ${1.2+Math.random()*1.5}s linear ${Math.random()*0.8}s forwards;z-index:9999;pointer-events:none`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

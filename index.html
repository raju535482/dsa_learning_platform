function labAutoIndent() {
  const ta = document.getElementById('labCode');
  const raw = ta.value;
  if (!raw.trim()) return;

  const isPython = labLang === 'python';
  const indentUnit = (labLang === 'javascript' || labLang === 'kotlin') ? '  ' : '    ';

  // Strip existing leading whitespace from each line, then re-indent
  const lines = raw.split('\n').map(l => l.trimStart());

  let level = 0;
  const out = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line) { out.push(''); continue; }

    // Decrease indent BEFORE printing closing tokens
    const trimClose = line.match(/^[\}\]\)]/);
    const isElse   = /^(else|} else|elif |except|finally|catch)/.test(line);
    const isCaseOrDefault = /^(case |default:)/.test(line);

    if (trimClose || isElse) level = Math.max(0, level - 1);
    if (isCaseOrDefault && level > 0) level = Math.max(0, level - 1);

    out.push(indentUnit.repeat(level) + line);

    // Increase indent AFTER printing opening tokens
    const opensBlock =
      line.endsWith('{') ||
      line.endsWith('(') ||
      line.endsWith('[') ||
      (isPython && line.endsWith(':') && !/^#/.test(line));

    // Brace-on-same-line (e.g. "} else {") — net change is 0 for first }, +1 for {
    const closeThenOpen = /\}.*\{/.test(line);
    const closeCount = (line.match(/\}/g) || []).length;
    const openCount  = (line.match(/\{/g) || []).length;

    if (isPython) {
      if (opensBlock) level++;
    } else {
      // For } else { / } catch ( — the } was already handled above via isElse/trimClose,
      // so only count the net of remaining opens and closes on this line.
      let opens = openCount, closes = closeCount;
      if (isElse || trimClose) closes = Math.max(0, closes - 1); // already subtracted one }
      const net = opens - closes;
      if (net > 0) level += net;
      else if (net < 0) level = Math.max(0, level + net);

      if (isCaseOrDefault) level++;
    }
  }

  const indented = out.join('\n');
  if (indented === raw) return; // nothing changed

  // Preserve cursor position approximately
  const selStart = ta.selectionStart;
  ta.value = indented;
  ta.selectionStart = ta.selectionEnd = Math.min(selStart, indented.length);

  onLabInput();

  // Flash the button to confirm
  const btn = document.querySelector('.lab-small-btn[onclick="labAutoIndent()"]');
  if (btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check"></i> Done!';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1200);
  }
}

// Sync textarea scroll → highlight layer + line numbers
function syncLabScroll() {
  const ta = document.getElementById('labCode');
  const hl = document.getElementById('labHlLayer');
  const ln = document.getElementById('labLineNos');
  hl.scrollTop = ta.scrollTop; hl.scrollLeft = ta.scrollLeft;
  ln.scrollTop = ta.scrollTop;
}
function updateLabCursor() {
  const ta = document.getElementById('labCode');
  const text = ta.value.substring(0, ta.selectionStart);
  const lines = text.split('\n');
  const ln = lines.length, col = lines[lines.length-1].length + 1;
  document.getElementById('labCursorPos').textContent = `Ln ${ln}, Col ${col}`;
}
function onLabInput() {
  const ta = document.getElementById('labCode');
  const code = ta.value;
  // Update highlight layer
  const hl = document.getElementById('labHlLayer');
  hl.innerHTML = highlight(code, labLang) + '\n'; // trailing newline keeps height in sync
  // Update line numbers
  const lines = code.split('\n').length;
  document.getElementById('labLineNos').textContent = Array.from({length:lines},(_,i)=>i+1).join('\n');
  syncLabScroll();
  updateLabCursor();
}
function labKeyDown(e) {
  // Tab → 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const s = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = s + 2;
    onLabInput();
  }
  // Auto-close brackets
  const pairs = {'(':')','{':'}','[':']','"':'"',"'":"'",'`':'`'};
  if (pairs[e.key]) {
    const ta = e.target, s = ta.selectionStart, end = ta.selectionEnd;
    if (s === end) {
      e.preventDefault();
      ta.value = ta.value.substring(0,s) + e.key + pairs[e.key] + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s + 1;
      onLabInput();
    }
  }
}

// Judge0 CE language IDs (no API key required)
const JUDGE0_LANG = { java: 62, kotlin: 78, python: 71, javascript: 63, cpp: 54, c: 50 };
const JUDGE0_URL  = 'https://ce.judge0.com/submissions?base64_encoded=false&wait=true';

async function runLabCode() {
  const code = document.getElementById('labCode').value.trim();
  if (!code) return;
  const runBtn = document.querySelector('.lab-run-btn');
  const out    = document.getElementById('labOutput');
  const timeEl = document.getElementById('labExecTime');

  runBtn.classList.add('running');
  runBtn.innerHTML = '<i class="ti ti-loader-2"></i> Running…';
  out.className = 'lab-output';
  out.innerHTML = '<span style="color:var(--text-3)">⏳ Executing…</span>';
  timeEl.textContent = '';

  const t0 = Date.now();
  try {
    const res = await fetch(JUDGE0_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source_code: code,
        language_id: JUDGE0_LANG[labLang] || 62,
        stdin: ''
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const data = await res.json();
    const elapsed = Date.now() - t0;

    const stdout  = (data.stdout  || '').trimEnd();
    const stderr  = (data.stderr  || '').trimEnd();
    const compile = (data.compile_output || '').trimEnd();
    const status  = data.status?.description || '';
    const time_ms = data.time ? Math.round(data.time * 1000) : elapsed;
    const mem_kb  = data.memory ? `${(data.memory/1024).toFixed(1)} MB` : '';

    timeEl.textContent = `${time_ms}ms${mem_kb ? ' · ' + mem_kb : ''}`;

    const accepted = data.status?.id === 3; // id 3 = Accepted

    if (!accepted && compile) {
      out.className = 'lab-output error';
      out.textContent = `Compile Error:\n${compile}`;
    } else if (status === 'Time Limit Exceeded') {
      out.className = 'lab-output error';
      out.textContent = '⏱ Time Limit Exceeded — infinite loop or too slow?';
    } else if (!accepted && stderr) {
      out.className = 'lab-output error';
      out.textContent = stderr + (stdout ? '\n\n' + stdout : '');
    } else {
      out.className = 'lab-output';
      out.textContent = stdout || '(no output)';
    }
  } catch(err) {
    out.className = 'lab-output error';
    out.textContent = '⚠ Could not reach execution server.\n' + err.message;
    timeEl.textContent = '';
  } finally {
    runBtn.classList.remove('running');
    runBtn.innerHTML = '<i class="ti ti-player-play"></i> Run';
  }
}

// ── Complexity Analyzer ──
function analyzeLabComplexity() {
  const code = document.getElementById('labCode').value;
  if (!code.trim()) return;
  const result = computeComplexity(code, labLang);
  renderComplexityUI(result);
}

function computeComplexity(code, lang) {
  const lines = code.split('\n');
  const stripped = lines.map(l => l.replace(/\/\/.*|#.*/g,'').replace(/\/\*[\s\S]*?\*\//g,'').trim()).filter(Boolean);
  const flat = stripped.join('\n');

  // ── Detect patterns ──
  const loopKw = /\b(for|while|forEach|stream|each)\b/;
  const recPattern = detectRecursion(stripped, lang);
  const hasMemo = /\b(memo|dp\[|cache|HashMap|Map|dict\[|@lru_cache)\b/.test(flat);
  const hasBinSearch = /\b(lo|low|left|hi|high|right|mid)\b[\s\S]{0,80}\b(lo|low|left|hi|high|right|mid)\b/.test(flat) && loopKw.test(flat);
  const hasSort = /\.(sort|sorted|mergeSort|quickSort)\b|Arrays\.sort|Collections\.sort/.test(flat);
  const has2DArray = /\[\s*\]\s*\[\s*\]|new\s+\w+\[\w+\]\[\w+\]/.test(flat);
  const hasMapOp = /\.(get|put|containsKey|getOrDefault|computeIfAbsent)\s*\(|dict\[|\.has\(/.test(flat);

  // Count loop nesting depth — count per-line occurrences so single-line nesting is caught
  let maxNest = 0, nest = 0;
  for (const l of stripped) {
    const loopsOnLine = (l.match(/\b(for|while|forEach)\b/g)||[]).length;
    nest += loopsOnLine;
    maxNest = Math.max(maxNest, nest);
    // closing braces reduce nesting — count them per line too
    const closes = (l.match(/\}/g)||[]).length;
    nest = Math.max(0, nest - closes);
  }
  const loopCount = (flat.match(/\b(for|while)\b/g)||[]).length;

  // ── Derive time complexity ──
  let timeComplex, timeClass, timeReason, details = [];

  if (recPattern.found && !hasMemo) {
    if (recPattern.branches >= 2) {
      timeComplex = `O(${recPattern.branches}ⁿ)`;
      timeClass = 'cx-o2n';
      timeReason = `Exponential: recursive function "${recPattern.name}" branches ${recPattern.branches}x per call without memoization.`;
    } else {
      timeComplex = 'O(n)';
      timeClass = 'cx-on';
      timeReason = `Linear recursion: "${recPattern.name}" recurses once per level — no branching.`;
    }
  } else if (recPattern.found && hasMemo) {
    timeComplex = 'O(n)';
    timeClass = 'cx-on';
    timeReason = `Memoized recursion: each subproblem computed once and cached (memo/DP table detected).`;
  } else if (hasBinSearch) {
    if (loopCount > 1 || maxNest > 1) {
      timeComplex = 'O(n log n)';
      timeClass = 'cx-on';
      timeReason = 'Binary search (O(log n)) inside an outer loop — combined O(n log n).';
    } else {
      timeComplex = 'O(log n)';
      timeClass = 'cx-ologn';
      timeReason = 'Binary search pattern detected: halves search space each iteration.';
    }
  } else if (hasSort && maxNest <= 1) {
    timeComplex = 'O(n log n)';
    timeClass = 'cx-on';
    timeReason = 'Sorting detected — standard comparison sort is O(n log n) average case.';
  } else if (maxNest >= 3) {
    timeComplex = 'O(n³)';
    timeClass = 'cx-o2n';
    timeReason = `Triple nested loop detected — cubic complexity. Very slow for large inputs.`;
  } else if (maxNest === 2) {
    timeComplex = 'O(n²)';
    timeClass = 'cx-on2';
    timeReason = 'Double nested loop detected — quadratic complexity. Acceptable up to n ≈ 10,000.';
  } else if (loopCount === 1) {
    timeComplex = 'O(n)';
    timeClass = 'cx-on';
    timeReason = 'Single loop over input — linear time. Scales well.';
  } else if (loopCount > 1 && maxNest <= 1) {
    timeComplex = 'O(n)';
    timeClass = 'cx-on';
    timeReason = `${loopCount} sequential (non-nested) loops — still O(n) total, constants don't change Big-O.`;
  } else {
    timeComplex = 'O(1)';
    timeClass = 'cx-o1';
    timeReason = 'No loops or recursion detected — constant time.';
  }

  // ── Derive space complexity ──
  let spaceComplex, spaceClass, spaceReason;
  if (has2DArray) {
    spaceComplex = 'O(n²)'; spaceClass = 'cx-on2';
    spaceReason = '2D array / matrix detected — quadratic extra space.';
  } else if (recPattern.found) {
    const stackDepth = recPattern.branches >= 2 ? 'O(n)' : 'O(n)';
    spaceComplex = stackDepth; spaceClass = 'cx-on';
    spaceReason = `Recursion uses O(n) call stack space (depth of recursion tree).`;
  } else if (/new\s+(int|char|byte|String|Object|Integer|Node|TreeNode)\s*\[|ArrayList|LinkedList|HashMap|HashSet|vector|list\s*=\s*\[|arr\s*=\s*\[|\[\s*\]/.test(flat)) {
    spaceComplex = 'O(n)'; spaceClass = 'cx-on';
    spaceReason = 'Dynamic data structure (array, list, map, set) allocated proportional to input.';
  } else if (hasMapOp) {
    spaceComplex = 'O(n)'; spaceClass = 'cx-on';
    spaceReason = 'HashMap/HashSet usage — O(n) space for entries in worst case.';
  } else {
    spaceComplex = 'O(1)'; spaceClass = 'cx-o1';
    spaceReason = 'Only fixed-size variables — constant extra space.';
  }

  // ── Build detail rows ──
  if (loopCount > 0) details.push({ icon:'🔄', text:`${loopCount} loop(s) found — max nesting depth: ${maxNest}` });
  if (recPattern.found) details.push({ icon:'🔁', text:`Recursive function "${recPattern.name}" (${recPattern.branches} branch${recPattern.branches>1?'es':''})` });
  if (hasMemo) details.push({ icon:'💾', text:'Memoization / DP table detected → eliminates redundant computation' });
  if (hasBinSearch) details.push({ icon:'🔍', text:'Binary search pattern: halves search range each step → O(log n)' });
  if (hasSort) details.push({ icon:'📊', text:'Sort call detected: O(n log n) in typical implementations' });
  if (hasMapOp) details.push({ icon:'🗂', text:'HashMap/HashSet operations: O(1) average per call' });
  if (has2DArray) details.push({ icon:'📐', text:'2D array: O(n²) space, potential O(n²) iteration cost' });

  // ── Optimization tip ──
  const tips = [];
  if (maxNest >= 2 && !hasMemo && !hasBinSearch)
    tips.push('Consider using a HashMap to reduce nested-loop lookups from O(n²) → O(n).');
  if (recPattern.found && !hasMemo && recPattern.branches >= 2)
    tips.push(`Add memoization (Map/array) to "${recPattern.name}" — can reduce O(${recPattern.branches}ⁿ) → O(n).`);
  if (hasSort && maxNest >= 2)
    tips.push('Sorting is already O(n log n). Check if the outer loop can be eliminated with a two-pointer or sliding window.');
  if (maxNest >= 3)
    tips.push('Triple nesting is rarely necessary — consider restructuring with better data structures (heap, prefix sum, segment tree).');

  return { timeComplex, timeClass, timeReason, spaceComplex, spaceClass, spaceReason, details, tip: tips[0]||null, lang };
}

function detectRecursion(lines, lang) {
  // Find function definitions and check if they call themselves
  const javaTypes = 'void|int|long|double|float|boolean|char|byte|short|String|Integer|List|Map|Set|Object|Array|Node|TreeNode';
  const defPatterns = {
    java: new RegExp(`(?:(?:public|private|protected|static|final|abstract)\\s+)*(?:${javaTypes})[\\[\\]]*\\s+(\\w+)\\s*\\(`),
    kotlin: /fun\s+(\w+)\s*\(/,
    python: /def\s+(\w+)\s*\(/,
    javascript: /(?:function\s+(\w+)|(?:const|let|var)\s+(\w+)\s*=\s*(?:function|\())/,
    cpp: new RegExp(`(?:${javaTypes}|auto|size_t|unsigned)\\s+(\\w+)\\s*\\(`),
    c:   new RegExp(`(?:${javaTypes}|void|unsigned|size_t)\\s+(\\w+)\\s*\\(`),
  };
  const defPat = defPatterns[lang] || defPatterns.java;
  const funcs = [];
  for (const l of lines) {
    const m = l.match(defPat);
    if (m) { const name = m[1]||m[2]; if (name && name !== 'main' && name !== 'if' && name !== 'for' && name !== 'while') funcs.push(name); }
  }
  for (const name of funcs) {
    const bodyLines = lines.filter(l => !l.match(defPat) || l.includes(name));
    const callCount = bodyLines.filter(l => new RegExp(`\\b${name}\\s*\\(`).test(l)).length;
    if (callCount >= 1) {
      // Count branches (how many times function calls itself)
      const selfCalls = bodyLines
        .filter(l => !l.match(defPat))
        .reduce((sum, l) => sum + ((l.match(new RegExp(`\\b${name}\\s*\\(`, 'g')))||[]).length, 0);
      return { found: true, name, branches: Math.min(selfCalls, 4) };
    }
  }
  return { found: false, name: '', branches: 0 };
}

  const tc = colorMap[r.timeClass]||'var(--text-1)';
  const sc = colorMap[r.spaceClass]||'var(--text-1)';

  const detailRows = r.details.map(d => `
    <div class="cx-detail-row">
      <span class="cx-icon">${d.icon}</span>
      <span>${d.text}</span>
    </div>`).join('');

  cx.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="cx-card">
        <div class="cx-title">⏱ Time Complexity</div>
        <div class="cx-big ${r.timeClass}" style="color:${tc}">${r.timeComplex}</div>
        <div class="cx-reason">${r.timeReason}</div>
      </div>
      <div class="cx-card">
        <div class="cx-title">💾 Space Complexity</div>

        <div class="cx-reason">${r.spaceReason}</div>
      </div>
    </div>

    ${detailRows.length ? `<div class="cx-card"><div class="cx-title">📋 Code Patterns Detected</div><div class="cx-detail">${detailRows}</div></div>` : ''}

    <div class="cx-card">
      <div class="cx-title">📈 Complexity Scale</div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-top:4px">
        ${[
          ['O(1)','Constant — best possible','cx-o1'],
          ['O(log n)','Logarithmic — binary search','cx-ologn'],
          ['O(n)','Linear — single pass','cx-on'],
          ['O(n log n)','Linearithmic — efficient sort','cx-on'],
          ['O(n²)','Quadratic — nested loops','cx-on2'],
          ['O(2ⁿ)','Exponential — avoid for large n','cx-o2n'],
        ].map(([label, desc, cls]) => {
          const isCur = label === r.timeComplex || (label==='O(n log n)' && r.timeComplex==='O(n log n)');
          return `<div style="display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;${isCur?'background:var(--accent-bg);border:1px solid var(--accent)':''}">
            <span class="badge ${cls==='cx-o1'?'badge-g':cls==='cx-ologn'?'badge-b':cls==='cx-on2'?'badge-y':cls==='cx-o2n'?'badge-r':'badge-b'}" style="min-width:80px;text-align:center">${label}</span>
            <span style="font-size:11.5px;color:var(--text-2)">${desc}</span>
            ${isCur?'<span style="margin-left:auto;font-size:10px;font-weight:700;color:var(--accent2)">← YOUR CODE</span>':''}
          </div>`;
        }).join('')}
      </div>
    </div>

    ${r.tip ? `<div class="cx-tip"><strong>💡 Optimization Tip:</strong><br>${r.tip}</div>` : ''}
  `;
}
